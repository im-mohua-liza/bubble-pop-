<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Bubble Pop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div class="layer sky"></div>

        <div class="layer mountains">
            <div class="mountain m-pink"></div>
            <div class="mountain m-choco"></div>
            <div class="mountain m-cream"></div>
        </div>

        <div class="layer ambient-bubbles" id="ambient-layer"></div>

        <div class="layer foreground">
            <svg viewBox="0 0 1000 400" preserveAspectRatio="xMidYMax slice" class="candy-svg">
                <defs>
                    <linearGradient id="choc" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#4e342e"/>
                        <stop offset="100%" stop-color="#21120f"/>
                    </linearGradient>
                    <linearGradient id="syrup" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#ff4d6d" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#c9184a" stop-opacity="0"/>
                    </linearGradient>
                    <radialGradient id="lollipop-swirl" cx="50%" cy="50%" r="50%">
                        <stop offset="10%" stop-color="#fff"/>
                        <stop offset="25%" stop-color="#ff0a54"/>
                        <stop offset="45%" stop-color="#ffb703"/>
                        <stop offset="65%" stop-color="#8338ec"/>
                        <stop offset="90%" stop-color="#38b000"/>
                    </radialGradient>
                    <radialGradient id="cupcake-base">
                        <stop offset="0%" stop-color="#d4a373"/>
                        <stop offset="100%" stop-color="#faedcd"/>
                    </radialGradient>
                    <radialGradient id="cherry">
                        <stop offset="10%" stop-color="#ff99ac"/>
                        <stop offset="30%" stop-color="#c1121f"/>
                        <stop offset="100%" stop-color="#780000"/>
                    </radialGradient>
                </defs>

                <path d="M0,250 Q150,200 250,280 T550,250 T800,290 T1000,240 L1000,400 L0,400 Z" fill="url(#choc)"/>
                <path d="M0,250 Q150,200 250,280 T550,250 T800,290 T1000,240 L1000,320 Q800,350 550,280 T250,330 T0,290 Z" fill="url(#syrup)"/>

                <g transform="translate(150, 150)">
                    <rect x="-5" y="0" width="10" height="150" fill="#fff" rx="5"/>
                    <circle cx="0" cy="0" r="60" fill="url(#lollipop-swirl)"/>
                    <circle cx="0" cy="0" r="50" fill="none" stroke="#fff" stroke-width="8" stroke-dasharray="15,10" opacity="0.6"/>
                    <circle cx="-20" cy="-20" r="10" fill="#fff" opacity="0.5"/> </g>

                <g transform="translate(850, 100) scale(0.8)">
                    <rect x="-5" y="0" width="10" height="200" fill="#fff" rx="5"/>
                    <circle cx="0" cy="0" r="60" fill="url(#lollipop-swirl)" transform="rotate(45)"/>
                    <circle cx="0" cy="0" r="50" fill="none" stroke="#fff" stroke-width="8" stroke-dasharray="15,10" opacity="0.6"/>
                    <circle cx="-20" cy="-20" r="10" fill="#fff" opacity="0.5"/>
                </g>

                <g transform="translate(450, 200)">
                    <polygon points="-40,60 40,60 30,120 -30,120" fill="url(#cupcake-base)"/>
                    <line x1="-20" y1="60" x2="-15" y2="120" stroke="#b5835a" stroke-width="3"/>
                    <line x1="0" y1="60" x2="0" y2="120" stroke="#b5835a" stroke-width="3"/>
                    <line x1="20" y1="60" x2="15" y2="120" stroke="#b5835a" stroke-width="3"/>
                    <path d="M-50,60 Q-60,30 -30,20 Q-20,-10 0,-20 Q20,-10 30,20 Q60,30 50,60 Z" fill="#fff0f3"/>
                    <path d="M-30,20 Q0,-10 30,20" fill="none" stroke="#ffb3c6" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="0" cy="-25" r="15" fill="url(#cherry)"/>
                    <path d="M0,-40 Q10,-55 20,-50" fill="none" stroke="#606c38" stroke-width="3"/>
                    <rect x="-20" y="30" width="8" height="3" fill="#ff0a54" rx="1" transform="rotate(30)"/>
                    <rect x="10" y="40" width="8" height="3" fill="#38b000" rx="1" transform="rotate(-45)"/>
                    <rect x="0" y="10" width="8" height="3" fill="#ffb703" rx="1" transform="rotate(15)"/>
                </g>

                <ellipse cx="300" cy="300" rx="20" ry="12" fill="#8338ec" transform="rotate(20 300 300)"/>
                <ellipse cx="295" cy="295" rx="5" ry="3" fill="#fff" opacity="0.6" transform="rotate(20 295 295)"/>
                
                <ellipse cx="700" cy="320" rx="25" ry="15" fill="#38b000" transform="rotate(-15 700 320)"/>
                <ellipse cx="695" cy="315" rx="6" ry="4" fill="#fff" opacity="0.6" transform="rotate(-15 695 315)"/>
            </svg>
        </div>

        <div id="stage" class="layer"></div>

        <div id="hud" class="glass-ui">
            <div class="stat">Level: <span id="val-level">1</span></div>
            <div class="stat">Score: <span id="val-score">0</span></div>
            <div class="stat">Missed: <span id="val-missed">0</span>/5</div>
        </div>

        <div id="start-screen" class="screen glass-panel">
            <h1 class="game-title">CANDY<br>BUBBLE POP</h1>
            <button id="btn-start" class="btn btn-green">START GAME</button>
            <button class="btn btn-blue">LEADERBOARD</button>
            <button class="btn btn-orange">SETTINGS</button>
        </div>

        <div id="game-over-screen" class="screen glass-panel hidden">
            <h1 class="game-title">GAME OVER</h1>
            <p class="final-score-text">Final Score: <span id="val-final-score">0</span></p>
            <button id="btn-restart" class="btn btn-green">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
